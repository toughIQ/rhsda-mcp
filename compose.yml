version: '3.8'

services:
  rhsda-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rhsda-mcp-server
    ports:
      - "6060:8000"  # Map external port 6060 to internal port 8000
    environment:
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8000
      - FASTMCP_TRANSPORT=http
      - FASTMCP_LOG_LEVEL=INFO
    restart: unless-stopped
